<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sephiroth - Cloud Drive</title>
    <style>
        :root {
            --abismo: #0a0a0a;
            --acero: #c0c0c0;
            --mako: #00f2ad;
            --peligro: #8b0000;
            --peligro-claro: #ff5c5c;
            --card-bg: #161616;
            --panel: #202020;
            --muted: #777;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--abismo);
            color: var(--acero);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--acero);
            box-shadow: 0 0 15px var(--mako);
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 242, 173, 0.3);
        }

        .container {
            width: 90%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 5px;
            border-left: 4px solid var(--mako);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .upload-section {
            border: 1px dashed var(--acero);
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .upload-section.is-dragging {
            background: rgba(0, 242, 173, 0.08);
            border-color: var(--mako);
            box-shadow: 0 0 18px rgba(0, 242, 173, 0.2);
        }

        input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
        }

        .upload-form {
            width: 100%;
        }

        .file-picker {
            background: var(--panel);
            border: 1px solid #333;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            margin-bottom: 15px;
            padding: 16px;
            text-align: left;
            transition: 0.2s;
        }

        .file-picker:hover,
        .upload-section.is-dragging .file-picker {
            border-color: var(--mako);
        }

        .file-picker strong {
            color: var(--mako);
            display: block;
            margin-bottom: 5px;
        }

        .file-picker span {
            color: var(--muted);
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        button {
            background: transparent;
            color: var(--mako);
            border: 1px solid var(--mako);
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: var(--mako);
            color: var(--abismo);
            box-shadow: 0 0 15px var(--mako);
        }

        button:disabled {
            border-color: #444;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        button:disabled:hover {
            background: transparent;
            color: #555;
        }

        .notice {
            border-radius: 5px;
            display: none;
            margin-bottom: 20px;
            padding: 12px 14px;
        }

        .notice.is-visible {
            display: block;
        }

        .notice.success {
            background: rgba(0, 242, 173, 0.12);
            border: 1px solid rgba(0, 242, 173, 0.45);
            color: var(--mako);
        }

        .notice.error {
            background: rgba(139, 0, 0, 0.18);
            border: 1px solid rgba(255, 92, 92, 0.45);
            color: var(--peligro-claro);
        }

        .section-title {
            align-items: baseline;
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }

        .summary {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .file-item {
            background: #222;
            margin: 10px 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 3px;
            border: 1px solid #333;
            transition: 0.2s;
        }

        .file-item:hover {
            border-color: var(--mako);
        }

        .file-info {
            min-width: 0;
            padding-right: 16px;
        }

        .file-name {
            display: block;
            max-width: 340px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-meta {
            display: block;
            margin-top: 6px;
            color: #777;
            font-size: 0.78rem;
        }

        .actions a {
            color: var(--mako);
            text-decoration: none;
            margin-right: 15px;
            font-size: 0.9rem;
        }

        .btn-eliminar {
            background: transparent;
            color: var(--peligro);
            border: 1px solid var(--peligro);
            padding: 5px 10px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .empty-state {
            background: var(--panel);
            border: 1px solid #333;
            border-radius: 5px;
            color: var(--muted);
            padding: 22px;
            text-align: center;
        }

        .btn-eliminar:hover {
            background: var(--peligro);
            color: white;
            box-shadow: 0 0 10px var(--peligro);
        }

        .logout {
            margin-top: 30px;
            display: inline-block;
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
        }

        @media (max-width: 560px) {
            .file-item {
                align-items: flex-start;
                flex-direction: column;
                gap: 12px;
            }

            .section-title {
                align-items: flex-start;
                flex-direction: column;
                gap: 4px;
            }

            .file-name {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
    <h1>Sephiroth Cloud</h1>
    <p style="color: var(--mako); margin-top: 10px; font-weight: bold; letter-spacing: 2px;">
        BIENVENIDO, <span id="nombreUsuario">...</span>
    </p>
    </header>

    <div class="container">
        <div id="mensaje" class="notice" role="status" aria-live="polite"></div>

        <div id="uploadSection" class="upload-section">
            <h3>Invocar Objeto</h3>
            <form id="uploadForm" class="upload-form" action="/upload" method="POST" enctype="multipart/form-data">
                <label class="file-picker" for="archivoNube">
                    <strong>Arrastrar o seleccionar archivo</strong>
                    <span id="archivoSeleccionado">Ningún archivo seleccionado</span>
                </label>
                <input id="archivoNube" type="file" name="archivo_nube" required>
                <button id="botonSubir" type="submit" disabled>Subir a la Corriente Vital</button>
            </form>
        </div>

        <div class="section-title">
            <h3>Archivos en la Nube</h3>
            <span id="resumenArchivos" class="summary">Cargando...</span>
        </div>
        <ul id="listaArchivos" class="file-list">
            </ul>

        <center><a href="/logout" class="logout">Abandonar la Reunión (Cerrar Sesión)</a></center>
    </div>

    <script>
        const mensaje = document.getElementById('mensaje');
        const resumenArchivos = document.getElementById('resumenArchivos');
        const uploadSection = document.getElementById('uploadSection');
        const uploadForm = document.getElementById('uploadForm');
        const archivoNube = document.getElementById('archivoNube');
        const archivoSeleccionado = document.getElementById('archivoSeleccionado');
        const botonSubir = document.getElementById('botonSubir');

        function mostrarMensaje(texto, tipo = 'success') {
            mensaje.textContent = texto;
            mensaje.className = `notice ${tipo} is-visible`;
        }

        function limpiarMensaje() {
            mensaje.textContent = '';
            mensaje.className = 'notice';
        }

        function mostrarEstadoVacio(texto) {
            const lista = document.getElementById('listaArchivos');
            lista.innerHTML = '';

            const estado = document.createElement('li');
            estado.className = 'empty-state';
            estado.textContent = texto;
            lista.appendChild(estado);
        }

        async function cargarArchivos() {
            const lista = document.getElementById('listaArchivos');
            resumenArchivos.textContent = 'Cargando...';
            mostrarEstadoVacio('Cargando archivos...');

            try {
                const respuesta = await fetch('/api/archivos');

                if (!respuesta.ok) {
                    throw new Error('No se pudo cargar la lista de archivos.');
                }

                const archivos = await respuesta.json();
                
                lista.innerHTML = ''; 
                
                if (archivos.length === 0) {
                    resumenArchivos.textContent = '0 archivos';
                    mostrarEstadoVacio('No hay objetos en la nube.');
                    return;
                }

                const totalBytes = archivos.reduce((total, archivo) => total + Number(archivo.tamano || 0), 0);
                resumenArchivos.textContent = `${archivos.length} ${archivos.length === 1 ? 'archivo' : 'archivos'} · ${formatearTamano(totalBytes)}`;

                archivos.forEach(archivo => {
                    const nombre = archivo.nombre;
                    const li = document.createElement('li');
                    li.className = 'file-item';

                    const info = document.createElement('div');
                    info.className = 'file-info';

                    const nombreArchivo = document.createElement('span');
                    nombreArchivo.className = 'file-name';
                    nombreArchivo.title = nombre;
                    nombreArchivo.textContent = nombre;

                    const metadatos = document.createElement('span');
                    metadatos.className = 'file-meta';
                    metadatos.textContent = `${formatearTamano(archivo.tamano)} · ${archivo.tipo || 'tipo desconocido'} · ${formatearFecha(archivo.fecha)}`;

                    const acciones = document.createElement('div');
                    acciones.className = 'actions';

                    const descargar = document.createElement('a');
                    descargar.href = `/drive/${archivo.id}`;
                    descargar.download = '';
                    descargar.textContent = 'Descargar';

                    const eliminar = document.createElement('button');
                    eliminar.className = 'btn-eliminar';
                    eliminar.type = 'button';
                    eliminar.textContent = 'Eliminar';
                    eliminar.addEventListener('click', () => eliminarArchivo(archivo.id));

                    info.appendChild(nombreArchivo);
                    info.appendChild(metadatos);
                    acciones.appendChild(descargar);
                    acciones.appendChild(eliminar);
                    li.appendChild(info);
                    li.appendChild(acciones);
                    lista.appendChild(li);
                });
            } catch (error) {
                console.error("Error cargando archivos:", error);
                resumenArchivos.textContent = 'Error';
                mostrarEstadoVacio('No se pudieron cargar los archivos.');
                mostrarMensaje('No se pudieron cargar los archivos. Revisa la conexión e inténtalo de nuevo.', 'error');
            }
        }

        function formatearTamano(bytes) {
            const totalBytes = Number(bytes);

            if (!Number.isFinite(totalBytes) || totalBytes <= 0) {
                return '0 B';
            }

            const unidades = ['B', 'KB', 'MB', 'GB'];
            const indice = Math.min(Math.floor(Math.log(totalBytes) / Math.log(1024)), unidades.length - 1);
            const valor = totalBytes / Math.pow(1024, indice);

            return `${valor.toFixed(indice === 0 ? 0 : 1)} ${unidades[indice]}`;
        }

        function formatearFecha(fecha) {
            const parsedDate = new Date(`${fecha} UTC`);

            if (Number.isNaN(parsedDate.getTime())) {
                return 'fecha desconocida';
            }

            return parsedDate.toLocaleString('es-ES', {
                dateStyle: 'short',
                timeStyle: 'short'
            });
        }

        async function eliminarArchivo(idArchivo) {
            if (confirm(`¿Estás seguro de que quieres destruir este objeto?`)) {
                try {
                    limpiarMensaje();
                    const res = await fetch('/api/eliminar', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({ idArchivo })
                    });
                    
                    const resultado = await res.json();
                    
                    if (resultado.success) {
                        mostrarMensaje('Archivo eliminado correctamente.');
                        cargarArchivos();
                    } else {
                        mostrarMensaje('El servidor no pudo borrar el archivo.', 'error');
                    }
                } catch (error) {
                    console.error("Error en la petición de borrado:", error);
                    mostrarMensaje('Error de conexión al borrar el archivo.', 'error');
                }
            }
        }

        function actualizarArchivoSeleccionado(archivo) {
            archivoSeleccionado.textContent = archivo ? `${archivo.name} · ${formatearTamano(archivo.size)}` : 'Ningún archivo seleccionado';
            botonSubir.disabled = !archivo;
        }

        function asignarArchivo(files) {
            const archivo = files && files[0];

            if (!archivo) {
                return;
            }

            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(archivo);
            archivoNube.files = dataTransfer.files;
            actualizarArchivoSeleccionado(archivo);
            limpiarMensaje();
        }

        let contadorArrastre = 0;

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach((evento) => {
            uploadSection.addEventListener(evento, (event) => {
                event.preventDefault();
                event.stopPropagation();
            });
        });

        uploadSection.addEventListener('dragenter', () => {
            contadorArrastre += 1;
            uploadSection.classList.add('is-dragging');
        });

        uploadSection.addEventListener('dragover', (event) => {
            event.dataTransfer.dropEffect = 'copy';
            uploadSection.classList.add('is-dragging');
        });

        uploadSection.addEventListener('dragleave', () => {
            contadorArrastre = Math.max(0, contadorArrastre - 1);

            if (contadorArrastre === 0) {
                uploadSection.classList.remove('is-dragging');
            }
        });

        uploadSection.addEventListener('drop', (event) => {
            contadorArrastre = 0;
            uploadSection.classList.remove('is-dragging');
            asignarArchivo(event.dataTransfer.files);
        });

        archivoNube.addEventListener('change', () => {
            actualizarArchivoSeleccionado(archivoNube.files[0]);
            limpiarMensaje();
        });

        uploadForm.addEventListener('submit', () => {
            botonSubir.disabled = true;
            botonSubir.textContent = 'Subiendo...';
        });

        async function obtenerNombre() {
    try {
        const res = await fetch('/api/usuario-actual');
        const data = await res.json();
        // Ponemos el nombre en mayúsculas para que sea más imponente
        document.getElementById('nombreUsuario').textContent = data.user.toUpperCase();
    } catch (error) {
        console.error("Error al obtener identidad:", error);
    }
}

const params = new URLSearchParams(window.location.search);
if (params.get('uploaded') === '1') {
    mostrarMensaje('Archivo subido correctamente.');
    window.history.replaceState({}, '', window.location.pathname);
}

obtenerNombre();
cargarArchivos();
    </script>
</body>
</html>
